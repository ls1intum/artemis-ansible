---
##############################################################################
# TUM LocalVC Jenkins Stateless Configuration
##############################################################################

version_control:
  localvc:
    url: "{{ artemis_server_url }}"
    build_agent_git_credentials:
      user: "{{ lookup('hashi_vault', 'kv/data/artemis/common/hades-test').get('artemis-build-agent-git-username') }}"
      password: "{{ lookup('hashi_vault', 'kv/data/artemis/common/hades-test').get('artemis-build-agent-git-password') }}"

continuous_integration:
  hades:
    url: "https://hades-test.aet.cit.tum.de"
    artemis_auth_token_value: "{{ lookup('hashi_vault', 'kv/data/artemis/common/hades-test').get('artemis-authentication-token-value') }}"
    auth_key: "{{ lookup('hashi_vault', 'kv/data/artemis/common/hades-test').get('auth-key') }}"
    adapter_endpoint: "https://hades-artemis-connector.student.k8s.aet.cit.tum.de/adapter/test-results"
